<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>諧音地下城：節奏遠征</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud">
        <div class="card">
          <h2>玩家</h2>
          <p>HP <span id="player-hp">120</span></p>
          <p>連擊 <span id="combo">0</span></p>
          <p>舒適度 <span id="comfort">20</span> / 狀態 <span id="comfort-tier">Normal</span></p>
          <p>分數 <span id="score">0</span></p>
          <p>天賦點 <span id="profile-points">0</span></p>
          <div class="mode-row">
            <button id="mode-arcade">標準遠征</button>
            <button id="mode-daily">每日挑戰</button>
          </div>
        </div>
        <div class="card portrait-card">
          <img id="player-art" src="assets/player.svg" alt="player" />
          <img id="enemy-art" src="assets/enemy.svg" alt="enemy" />
        </div>
        <div class="card">
          <h2>敵人</h2>
          <p id="enemy-name">鴨力山大魔王</p>
          <p>HP <span id="enemy-hp">70</span></p>
          <p>波次 <span id="wave">1</span> / 危險度 <span id="danger">1.00x</span></p>
          <p id="enemy-line">今天你有多鴨力？</p>
          <p id="boss-alert" class="small"></p>
        </div>
      </section>

      <section class="battle">
        <div class="rhythm card" id="rhythm-panel">
          <div class="rhythm-top">
            <strong>節奏戰鬥</strong>
            <label>BPM <input id="bpm-input" type="range" min="70" max="160" value="92" /><span id="bpm-value">92</span></label>
            <span>倍率 <span id="bpm-bonus">1.00x</span></span>
            <button id="metronome-toggle">節拍音</button>
          </div>
          <div class="track">
            <div class="target"></div>
            <div id="beat-marker" class="marker"></div>
          </div>
          <div class="actions" id="actions"></div>
          <p id="action-detail" class="small"></p>
          <button id="hit-button" class="primary">出招（Space/Enter）</button>
          <p id="timing-result">等待輸入</p>
          <p id="log" class="small"></p>
        </div>

        <aside class="side card">
          <h3>已裝備</h3>
          <p id="equipped">尚未裝備</p>
          <p id="equip-detail" class="small"></p>
          <div id="inventory" class="inventory"></div>
          <button id="sort-button">整理背包</button>
        </aside>
      </section>

      <section class="drawers">
        <details open>
          <summary>成長與任務</summary>
          <div class="drawer-grid">
            <div>
              <p>等級 <span id="profile-level">1</span> / 經驗 <span id="profile-exp">0</span></p>
              <p>總擊敗 <span id="profile-kills">0</span> / 永久加成 <span id="profile-bonus">0</span></p>
              <p>每日最高分 <span id="daily-best">0</span></p>
              <p id="mode-note" class="small">標準遠征</p>
            </div>
            <div id="missions"></div>
          </div>
        </details>
        <details>
          <summary>天賦樹</summary>
          <div class="skill-grid">
            <button id="skill-timing">節拍專注</button>
            <button id="skill-guard">抗壓心流</button>
            <button id="skill-loot">掉寶手感</button>
          </div>
        </details>
      </section>
    </main>

    <script src="logic.js"></script>
    <script src="game.js"></script>
  </body>
</html>
