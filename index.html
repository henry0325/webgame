<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>諧音地下城：節奏審判</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>諧音地下城：節奏審判</h1>
        <p class="subtitle">TRPG 敘事 × 諧音惡搞 × 節奏戰鬥 × 強迫症友善整理</p>
      </header>

      <section class="panel status-panel">
        <div class="status-card">
          <h2>玩家</h2>
          <p>HP: <span id="player-hp">100</span></p>
          <p>連擊: <span id="combo">0</span></p>
          <p>舒適度: <span id="comfort">0</span></p>
        </div>
        <div class="status-card">
          <h2>敵人</h2>
          <p id="enemy-name">鴨力山大魔王</p>
          <p>HP: <span id="enemy-hp">100</span></p>
          <p id="enemy-line">「今天你有多鴨力？」</p>
        </div>
      </section>

      <section class="panel rhythm-panel">
        <h3>節奏判定（空白鍵或 Enter）</h3>
        <div class="beat-track" aria-label="beat track">
          <div class="beat-target"></div>
          <div id="beat-marker" class="beat-marker"></div>
        </div>
        <p>判定: <strong id="timing-result">等待輸入</strong></p>
      </section>

      <section class="panel action-panel">
        <h3>選擇諧音技能（按 1 / 2 / 3）</h3>
        <div id="actions" class="actions"></div>
        <button id="hit-button" class="primary">在拍點出招</button>
        <p id="log" class="log"></p>
      </section>

      <section class="panel ocd-panel">
        <h3>收納背包（強迫症舒適區）</h3>
        <div id="inventory" class="inventory-grid"></div>
        <button id="sort-button">一鍵整齊收納</button>
      </section>
    </main>

    <script src="logic.js"></script>
    <script src="game.js"></script>
  </body>
</html>
